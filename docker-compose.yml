services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: lawkg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  vector:
    build: ./vector
    ports:
      - "9998:9998"
    environment:
      - MODEL_NAME=text2vec-large-chinese
    volumes:
      - vectordata:/root/.cache/torch
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9998/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/lawkg
      - VECTOR_API_URL=http://vector:9998
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.deepseek.com/v1}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
    depends_on:
      db:
        condition: service_healthy
      vector:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
  vectordata:
