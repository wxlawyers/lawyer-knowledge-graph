version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: lawkg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  vector:
    image: shibing624/text2vec:latest
    ports:
      - "9998:9998"
    command: --model_name=text2vec-large-chinese --port=9998
    volumes:
      - vectordata:/root/.cache/torch

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/lawkg
      - VECTOR_API_URL=http://vector:9998
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      vector:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
  vectordata:
